services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       op_tcg
      POSTGRES_USER:     op_user
      POSTGRES_PASSWORD: op_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://op_user:op_password@db:5432/op_tcg
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
